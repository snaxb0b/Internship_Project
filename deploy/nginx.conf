events {
}

http {
    upstream fastapi_backend {
        # กรณี Nginx กับ FastAPI
        # ทำงานบนเครื่องเดียวกัน
        server 127.0.0.1:8000;
    }

    server {
        listen 8080;
        server_name localhost;

        # Request ทั้งก้อนสูงสุด 12 MiB
        client_max_body_size 12M;

        # เปลี่ยน Error 413 ให้เป็น JSON
        error_page 413 = @request_too_large;

        location @request_too_large {
            default_type application/json;

            return 413
                '{"detail":"Request body exceeds the 12 MiB limit"}';
        }

        location /api/ {
            proxy_pass http://fastapi_backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For
                $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto
                $scheme;
        }

        location /results/ {
            proxy_pass http://fastapi_backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For
                $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto
                $scheme;
        }

        location /health {
            proxy_pass http://fastapi_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto
                $scheme;
        }
    }
}